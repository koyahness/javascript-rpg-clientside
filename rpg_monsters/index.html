<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>RPG-Dragon Repeller</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>

    <div id="game"> 

        <div id="stats">
            <span class="stat">XP: <strong><span id="xpText">0</span></strong>  </span>
            <span class="stat">Health: <strong><span id="healthText">100</span></strong>  </span>
            <span class="stat">Gold: <strong><span id="goldText">50</span></strong>  </span>
        </div>

        <div id="controls">
            <button id="button1">Go to store</button>
            <button id="button2">Go to cave</button>
            <button id="button3">Fight dragon</button>
        </div>

        <!-- use CSS to hide this monsterstats div on the webpage body -->
         <!-- this will only appear when fighting a monster -->
        <div id="monsterStats">
            <span class="stat">Monster Name: <strong><span id="MonsterName"></span></strong>  </span>
            <span class="stat">Health: <strong><span id="MonsterHealth"></span></strong>  </span>
        </div>

        <div id="text">
            Welcome to the Dragon Repeller Game! You must defeat the dragon preventing people from getting into town.You are currently in the "Town square", where do you want to go next? Use the buttons to "Go to store" or "Go to cave" or "Fight dragon".
        </div>

    </div>

     <canvas id="canvas1">

        
     </canvas>

    <script src="script.js"></script>
    <script src="index.js"></script>

</body>

</html>
